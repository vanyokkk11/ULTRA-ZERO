        .upgrade-area, .skin-shop { background: #f0cf87; border-radius: 32px; padding: 12px; margin-top: 15px; }
        .buff-timer, .ultra-charge { background: #2b2b1f; color: #ffd966; padding: 4px 12px; border-radius: 40px; font-size: 0.8rem; position: fixed; bottom: 20px; font-weight: bold; pointer-events: none; }

        // Пассивные состояния (для revive, invisible и т.д.)
        let reviveUsed = false;

        let skeletonEnemies = [];
        
        function getPassiveEffect(brawlerId) { return brawlersCatalog[brawlerId]?.passiveEffect || null; }
        
        function recalcStats() {
            let b = brawlersCatalog[currentBrawlerId];
            if(!b) return;
            let level = b.level;
            let bonusHp = (level-1)*12;
            let bonusDmg = (level-1)*3;
            let skinData = getCurrentColorAndIcon();
            currentStats = {
                hp: b.hp + bonusHp,
                dmg: b.dmg + bonusDmg,
                speed: b.speed + (level-1)*0.05,
                level: level,
                maxHp: b.hp + bonusHp,
                baseDmg: b.dmg,
                color: skinData.color,
                icon: skinData.icon,
                passiveEffect: b.passiveEffect
            };
            document.getElementById("brawlerName").innerText = currentBrawlerId;
            document.getElementById("levelValue").innerText = level;
            document.getElementById("mapName").innerText = currentMapId;
            let passiveText = b.passive.split(":")[0];
            document.getElementById("passiveName").innerHTML = `✨ ${passiveText}`;
        }
        
        function getCurrentColorAndIcon() {
            let skinName = currentSkin[currentBrawlerId] || "Стандартный";
            let skin = skinsDB[currentBrawlerId]?.[skinName];
            if(skin) return { color: skin.color, icon: skin.icon };
            let base = brawlersCatalog[currentBrawlerId];
            return { color: base.baseColor, icon: base.baseIcon };
        }
        
        function updateUI() { document.getElementById("gemsValue").innerText = Math.floor(gems); document.getElementById("coinsValue").innerText = Math.floor(coins); }
        function addGems(amount) { gems += amount; updateUI(); updateAchievement("coin", amount); }
        function addCoins(amount) { coins += amount; updateUI(); updateAchievement("coin", amount); }
        function spendGems(amount) { if(gems>=amount) { gems-=amount; updateUI(); return true; } return false; }
        function spendCoins(amount) { if(coins>=amount) { coins-=amount; updateUI(); return true; } return false; }
        
        function purchaseBrawler(brawlerId) {
            if(ownedBrawlers.includes(brawlerId)) return true;
            let b = brawlersCatalog[brawlerId];
            if(gems >= b.priceGems) {
                gems -= b.priceGems;
                ownedBrawlers.push(brawlerId);
                if(!ownedSkins[brawlerId]) ownedSkins[brawlerId] = ["Стандартный"];
                if(!currentSkin[brawlerId]) currentSkin[brawlerId] = "Стандартный";
                updateUI();
                updateAchievement("brawler", 1);
                saveGame();
                return true;
            } else { alert(`Не хватает гемов! Нужно ${b.priceGems}⭐`); return false; }
        }
        
        function upgradeBrawler() {
            let b = brawlersCatalog[currentBrawlerId];
            if(b.level >= b.maxLevel) { alert("Макс. уровень!"); return false; }
            let cost = b.upgradeCost[b.level-1];
            if(coins >= cost) {
                coins -= cost;
                b.level++;
                recalcStats();
                updateUI();
                saveGame();
                return true;
            } else alert("Не хватает монет!");
            return false;
        }
        
        // Покупка скина за МОНЕТЫ
        function purchaseSkin(brawlerId, skinName) {
            if(!ownedSkins[brawlerId]) ownedSkins[brawlerId] = [];
            if(ownedSkins[brawlerId].includes(skinName)) return true;
            let skin = skinsDB[brawlerId][skinName];
            if(!skin) return false;
            if(coins >= skin.priceCoins) {
                coins -= skin.priceCoins;
                ownedSkins[brawlerId].push(skinName);
                updateUI();
                saveGame();
                return true;
            } else { alert(`Не хватает монет! Стоимость скина: ${skin.priceCoins}🪙`); return false; }
        }
        function setSkin(brawlerId, skinName) {
            if(!ownedSkins[brawlerId] || !ownedSkins[brawlerId].includes(skinName)) return false;
            currentSkin[brawlerId] = skinName;
            if(brawlerId === currentBrawlerId) recalcStats();
            saveGame();
            return true;
        }
        
        // ---- УЛЬТА И БАФФЫ ----
        function addUltraCharge(amount) { ultraCharge = Math.min(100, ultraCharge + amount); ultraReady = (ultraCharge >= 100); document.getElementById("ultraChargeDisplay").innerHTML = ultraReady ? "🌀 УЛЬТА ГОТОВА! [R]" : `🌀 УЛЬТА: ${Math.floor(ultraCharge)}%`; }
        function useUltra() {
            if(!ultraReady || paused || gameOver) return false;
            damageBuffUltraRemaining = 5;
            ultraCharge = 0; ultraReady = false;
            document.getElementById("ultraChargeDisplay").innerHTML = "🌀 УЛЬТА: 0%";
            showFloatingText("✨ УЛЬТА АКТИВИРОВАНА! +100% УРОНА ✨", player.x, player.y-30);
            updateAchievement("ultra", 1);
            return true;
        }
        function getCurrentDamage() {
            let bonus = 1;
            if(damageBuffRemaining > 0) bonus *= 1.5;
            if(damageBuffUltraRemaining > 0) bonus *= 2.0;
            return Math.floor(currentStats.dmg * bonus);
        }
        function applyDamageBuff(seconds) { damageBuffRemaining = Math.max(damageBuffRemaining, seconds); updateBuffUI(); }
        function updateBuffUI() {
            let el = document.getElementById("buffIndicator");
            if(damageBuffRemaining > 0) el.innerHTML = `⚡ +50% УРОНА (${Math.ceil(damageBuffRemaining)}с)`;
            else if(damageBuffUltraRemaining > 0) el.innerHTML = `✨ УЛЬТА +100% (${Math.ceil(damageBuffUltraRemaining)}с)`;
            else el.innerHTML = "💪 без баффа";
        }
        function updateBuffTimer(deltaSec) {
            if(damageBuffRemaining > 0) { damageBuffRemaining -= deltaSec; if(damageBuffRemaining <= 0) damageBuffRemaining = 0; }
            if(damageBuffUltraRemaining > 0) { damageBuffUltraRemaining -= deltaSec; if(damageBuffUltraRemaining <= 0) damageBuffUltraRemaining = 0; }
            updateBuffUI();
        }
        
        // ---- ДРОПЫ (без изменений) ----
        function openStarDrop() { if(spendGems(30)) { let reward = randomStarReward(); applyReward(reward); alert(`✨ СТАР ДРОП: ${reward.text}`); saveGame(); } else alert("Нужно 30 гемов!"); }
        function openChaosDrop() { if(spendGems(80)) { let reward = randomChaosReward(); applyReward(reward); alert(`💥 ХАОС ДРОП: ${reward.text}`); saveGame(); } else alert("Нужно 80 гемов!"); }
        function openUltraDrop() { if(spendGems(130)) { let reward = ultraReward(); applyReward(reward); alert(`🌀 УЛЬТРА ДРОП: ${reward.text}`); saveGame(); } else alert("Нужно 130 гемов!"); }
        function openOmegaDrop() { if(spendGems(200)) { let reward = omegaReward(); applyReward(reward); alert(`💎 ОМЕГА ДРОП: ${reward.text}`); saveGame(); } else alert("Нужно 200 гемов!"); }
        function randomStarReward() { let r=Math.random(); if(r<0.5) return { type:"coins", amount:120+Math.floor(Math.random()*130), text:`${120+Math.floor(Math.random()*130)} монет` }; else if(r<0.8) return { type:"gems", amount:5+Math.floor(Math.random()*10), text:`${5+Math.floor(Math.random()*10)} гемов` }; else return { type:"buff", amount:10, text:"Бафф урона +50% на 10 секунд!" }; }
        function randomChaosReward() { let r=Math.random(); if(r<0.3) return { type:"gems", amount:20+Math.floor(Math.random()*40), text:`${20+Math.floor(Math.random()*40)} гемов` }; else if(r<0.6) return { type:"coins", amount:350+Math.floor(Math.random()*300), text:`${350+Math.floor(Math.random()*300)} монет` }; else if(r<0.85) return { type:"upgrade_token", amount:1, text:"Бесплатное улучшение бойца!" }; else return { type:"buff", amount:15, text:"Мощный бафф +50% урона на 15 секунд!" }; }
        function ultraReward() { let r=Math.random(); if(r<0.4) return { type:"gems", amount:60+Math.floor(Math.random()*70), text:`${60+Math.floor(Math.random()*70)} гемов!` }; else if(r<0.7) return { type:"coins", amount:800+Math.floor(Math.random()*700), text:`${800+Math.floor(Math.random()*700)} монет` }; else if(r<0.9) return { type:"buff", amount:20, text:"Сверх-бафф +50% урона на 20 секунд!" }; else return { type:"legendary_shard", amount:1, text:"Легендарный осколок! +150 гемов + 1000 монет", extraGems:150, extraCoins:1000 }; }
        function omegaReward() { let r=Math.random(); if(r<0.3) return { type:"gems", amount:150+Math.floor(Math.random()*150), text:`${150+Math.floor(Math.random()*150)} гемов` }; else if(r<0.6) return { type:"coins", amount:2000+Math.floor(Math.random()*1500), text:`${2000+Math.floor(Math.random()*1500)} монет` }; else if(r<0.85) return { type:"free_max_level", amount:1, text:"МГНОВЕННЫЙ МАКСИМАЛЬНЫЙ УРОВЕНЬ для текущего бойца!" }; else return { type:"omega_bless", text:"БОЖЕСТВЕННОЕ БЛАГОСЛОВЕНИЕ: +250 гемов + 2000 монет", extraGems:250, extraCoins:2000 }; }
        function applyReward(reward) {
            if(reward.type === "coins") addCoins(reward.amount);
            else if(reward.type === "gems") addGems(reward.amount);
            else if(reward.type === "buff") applyDamageBuff(reward.amount);
            else if(reward.type === "upgrade_token") { let b = brawlersCatalog[currentBrawlerId]; if(b.level < b.maxLevel) { b.level++; recalcStats(); alert("Уровень повышен!"); } else addCoins(300); }
            else if(reward.type === "free_max_level") { let b = brawlersCatalog[currentBrawlerId]; b.level = b.maxLevel; recalcStats(); alert("Максимальный уровень!"); }
            else if(reward.type === "legendary_shard") { addGems(reward.extraGems || 150); addCoins(reward.extraCoins || 1000); }
            else if(reward.type === "omega_bless") { addGems(reward.extraGems); addCoins(reward.extraCoins); }
        }
        
        // ---- ВРАГИ (расширенные) ----
        let enemyTypes = [
            { name:"Стандарт", baseHp:40, baseDmg:12, speed:1.2, color:"#bc5a3c", radius:16, special: null },
            { name:"Быстрый", baseHp:30, baseDmg:8, speed:2.0, color:"#6aa84f", radius:14, special: null },
            { name:"Танк", baseHp:90, baseDmg:18, speed:0.9, color:"#5e3a2e", radius:22, special: null },
            { name:"Ледяной", baseHp:45, baseDmg:10, speed:1.1, color:"#6fa8dc", radius:16, special: "slow" },
            { name:"Огненный", baseHp:38, baseDmg:15, speed:1.3, color:"#e69138", radius:16, special: "burn" },
            { name:"Исцелитель", baseHp:50, baseDmg:5, speed:1.0, color:"#7cb342", radius:18, special: "heal", healAmount: 8 },
            { name:"Взрывной", baseHp:35, baseDmg:25, speed:1.4, color:"#d32f2f", radius:15, special: "explode", explosionRadius: 60 },
            { name:"Призыватель", baseHp:60, baseDmg:6, speed:0.8, color:"#8e24aa", radius:20, special: "summon", summonCooldown: 0 }
        ];
        
        // ---- ИГРОВАЯ АРЕНА ----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let player = { x:500, y:300, hp: currentStats.maxHp, maxHp: currentStats.maxHp, radius: 18, invincible: 0, slowTimer:0 };
        let keys = { w:false,s:false,a:false,d:false };
        let bullets = [];
        let enemies = [];
        let lootBoxes = [];
        let starDrops = [];
        let enemyBullets = [];
        let wave = 1;
        let enemiesToSpawn = 5;
        let gameOver = false;
        let paused = false;
        let score = 0;
        let bossSpawnedForWave = false;
        let mouseDown = false;
        let shootCooldown = 0;
        let shootDelay = 0.15;
        let floatingTexts = [];
        
        function spawnEnemy(isBoss = false) {
            if(isBoss) {
                let hpBoss = 400 + wave * 50;
                let dmgBoss = 25 + Math.floor(wave/2);
                enemies.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    radius: 34, hp: hpBoss, maxHp: hpBoss, dmg: dmgBoss, speed: 0.85,
                    color: "#aa2e6b", typeName: "БОСС", isBoss: true, shootCooldown: 0, shootDelay: 2.0, special: null
                });
            } else {
                let tpl = enemyTypes[Math.floor(Math.random()*enemyTypes.length)];
                let waveBonus = wave * 5;
                let hpFinal = tpl.baseHp + waveBonus;
                let dmgFinal = tpl.baseDmg + Math.floor(wave/3);
                let newEnemy = {
                    x: (Math.random() * (canvas.width + 100)) - 50,
                    y: (Math.random() * (canvas.height + 100)) - 50,
                    radius: tpl.radius, hp: hpFinal, maxHp: hpFinal, dmg: dmgFinal,
                    speed: tpl.speed + (wave*0.02), color: tpl.color, typeName: tpl.name,
                    isBoss: false, special: tpl.special, healAmount: tpl.healAmount, explosionRadius: tpl.explosionRadius,
                    summonCooldown: 0, burnTimer: 0
                };
                enemies.push(newEnemy);
            }
        }
        
        function checkBossSpawn() { if(wave % 2 === 0 && !bossSpawnedForWave) { bossSpawnedForWave = true; spawnEnemy(true); showFloatingText("🔥 БОСС-СТРЕЛОК ПОЯВИЛСЯ!", canvas.width/2, 60); } }
        
        function spawnLootBox() { if(lootBoxes.length < 3 && Math.random()<0.02) lootBoxes.push({ x:50+Math.random()*(canvas.width-100), y:50+Math.random()*(canvas.height-100), radius:18 }); }
        function spawnStarDropItem() { if(starDrops.length < 2 && Math.random()<0.01) starDrops.push({ x:40+Math.random()*(canvas.width-80), y:40+Math.random()*(canvas.height-80), radius:12, kind:Math.random()<0.6?"star":"chaos" }); }
        
        function shootAt(targetX, targetY) {
            if(paused || gameOver) return;
            let angle = Math.atan2(targetY - player.y, targetX - player.x);
            let dmg = getCurrentDamage();
            let bullet = { x:player.x, y:player.y, vx:Math.cos(angle)*8.5, vy:Math.sin(angle)*8.5, radius:6, damage:dmg, life:80, burn: false };
            if(currentStats.passiveEffect === "burn") bullet.burn = true;
            bullets.push(bullet);
        }
        
        function getMouseCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            mouseX = Math.min(Math.max(mouseX, 0), canvas.width);
            mouseY = Math.min(Math.max(mouseY, 0), canvas.height);
            return { mx: mouseX, my: mouseY };
        }
        
        let currentMousePos = { mx: player.x, my: player.y };
        canvas.addEventListener('mousemove', (e) => { if(!paused && !gameOver) currentMousePos = getMouseCanvasCoords(e); });
        canvas.addEventListener('mousedown', (e) => { e.preventDefault(); mouseDown = true; currentMousePos = getMouseCanvasCoords(e); shootAt(currentMousePos.mx, currentMousePos.my); shootCooldown = shootDelay; });
        window.addEventListener('mouseup', () => { mouseDown = false; shootCooldown = 0; });
        
        function showFloatingText(msg, x, y) { floatingTexts.push({ text: msg, x: x, y: y, life: 1.0 }); }
        
        function updateAchievement(type, amount=1) {
            let updated = false;
            for(let key in achievements) {
                let ach = achievements[key];
                if(ach.claimed) continue;
                if(key === "Убийца" && type === "kill") ach.progress += amount;
                if(key === "Мастер" && type === "kill") ach.progress += amount;
                if(key === "Богач" && type === "coin") ach.progress += amount;
                if(key === "Коллекционер" && type === "brawler") ach.progress += amount;
                if(key === "Ультимативный" && type === "ultra") ach.progress += amount;
                if(ach.progress >= ach.target && !ach.claimed) {
                    ach.claimed = true;
                    gems += ach.rewardGems;
                    coins += ach.rewardCoins;
                    updated = true;
                    showFloatingText(`🏆 Достижение: ${ach.desc} +${ach.rewardGems}⭐ +${ach.rewardCoins}🪙`, canvas.width/2, 100);
                }
            }
            if(updated) { updateUI(); saveGame(); }
        }
        
        function updateGame(deltaSec) {
            if(paused || gameOver) return;
            updateBuffTimer(deltaSec);
            // Пассивные эффекты
            if(currentStats.passiveEffect === "energize" && player.speedBoostTimer > 0) { player.speedBoostTimer -= deltaSec; if(player.speedBoostTimer<=0) player.speedBoostTimer=0; }
            let spd = currentStats.speed;
            if(player.slowTimer>0) { spd *= 0.6; player.slowTimer-=deltaSec; if(player.slowTimer<0) player.slowTimer=0; }
            if(player.speedBoostTimer>0) spd *= 1.15;
            if(keys.w) player.y -= spd;
            if(keys.s) player.y += spd;
            if(keys.a) player.x -= spd;
            if(keys.d) player.x += spd;
            player.x = Math.min(Math.max(player.x, 20), canvas.width-20);
            player.y = Math.min(Math.max(player.y, 20), canvas.height-20);
            if(player.invincible>0) player.invincible-=deltaSec;
            if(invisibleTimer>0) { invisibleTimer-=deltaSec; if(invisibleTimer<=0) invisibleTimer=0; }
            if(blockCooldown>0) blockCooldown-=deltaSec;
            
            // стрельба
            if(mouseDown && !paused && !gameOver) {
                if(shootCooldown <= 0) { shootAt(currentMousePos.mx, currentMousePos.my); shootCooldown = shootDelay; }
                else shootCooldown -= deltaSec;
            } else shootCooldown = 0;
            
            // пули игрока
            for(let i=0;i<bullets.length;i++) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;
                bullets[i].life--;
                if(bullets[i].life<=0 || bullets[i].x<-100 || bullets[i].x>canvas.width+100 || bullets[i].y<-100 || bullets[i].y>canvas.height+100) {
                    bullets.splice(i,1); i--; continue;
                }
                for(let j=0;j<enemies.length;j++) {
                    let e = enemies[j];
                    let dx = bullets[i].x - e.x, dy = bullets[i].y - e.y;
                    if(Math.hypot(dx,dy) < bullets[i].radius+e.radius) {
                        e.hp -= bullets[i].damage;
                        if(bullets[i].burn && !e.isBoss) { e.burnTimer = 3; }
                        bullets.splice(i,1);
                        if(e.hp<=0) {
                            let reward = e.isBoss ? 300 + Math.floor(Math.random()*200) : 20 + Math.floor(Math.random()*40);
                            addCoins(reward);
                            if(e.isBoss) addGems(15);
                            updateAchievement("kill", 1);
                            if(currentStats.passiveEffect === "energize") { player.speedBoostTimer = 2; }
                            if(currentStats.passiveEffect === "summonSkeleton" && !e.isBoss) {
                                enemies.push({ x:e.x, y:e.y, radius:12, hp:30, maxHp:30, dmg:8, speed:1.5, color:"#7f8c8d", typeName:"Скелет", isBoss:false, special:null });
                            }
                            enemies.splice(j,1);
                            score++;
                            if(score >= enemiesToSpawn) nextWave();
                            addUltraCharge(8);
                        }
                        break;
                    }
                }
            }
            
            // враги двигаются и атакуют
            for(let i=0;i<enemies.length;i++) {
                let e = enemies[i];
                let dx = player.x - e.x, dy = player.y - e.y;
                let dist = Math.hypot(dx,dy);
                if(dist>0.1) { let move = Math.min(e.speed, dist-20); e.x += (dx/dist)*move; e.y += (dy/dist)*move; }
                if(Math.hypot(player.x-e.x, player.y-e.y) < player.radius+e.radius && player.invincible<=0 && invisibleTimer<=0) {
                    let finalDmg = e.dmg;
                    if(currentStats.passiveEffect === "armor") finalDmg = Math.floor(finalDmg * 0.8);
                    if(currentStats.passiveEffect === "block" && blockCooldown<=0) { finalDmg = 0; blockCooldown = 10; showFloatingText("🛡️ БЛОК!", player.x, player.y-20); }
                    player.hp -= finalDmg;
                    player.invincible = 0.6;
                    if(e.special === "slow") player.slowTimer = 2.0;
                    if(currentStats.passiveEffect === "counter") { e.hp -= finalDmg * 0.5; showFloatingText("⚔️ КОНТРАТАКА", e.x, e.y-10); }
                    if(currentStats.passiveEffect === "thorns" && Math.random()<0.15) { e.hp -= finalDmg * 0.5; showFloatingText("🌵 ШИПЫ", e.x, e.y-10); }
                    if(player.hp <= 0) {
                        if(currentStats.passiveEffect === "revive" && !reviveUsed) { player.hp = currentStats.maxHp * 0.5; reviveUsed = true; showFloatingText("🔥 ВОЗРОЖДЕНИЕ!", player.x, player.y-30); player.invincible = 1.5; }
                        else { gameOver = true; alert("ПОРАЖЕНИЕ! Перезапустите арену в меню."); }
                    }
                    if(currentStats.passiveEffect === "shield") { player.invincible = 2; showFloatingText("🛡️ МАГЩИТ", player.x, player.y-15); }
                }
                if(e.burnTimer>0) { e.burnTimer-=deltaSec; e.hp -= 5*deltaSec; if(e.hp<=0) { /* смерть */ } }
                // особые способности врагов
                if(e.special === "heal" && !e.isBoss) {
                    for(let other of enemies) if(other !== e && Math.hypot(e.x-other.x, e.y-other.y) < 80) other.hp = Math.min(other.maxHp, other.hp + (e.healAmount || 5)*deltaSec);
                }
                if(e.special === "explode" && e.hp <= 0) {
                    for(let other of enemies) if(other !== e && Math.hypot(e.x-other.x, e.y-other.y) < (e.explosionRadius || 60)) other.hp -= 30;
                    showFloatingText("💥 ВЗРЫВ!", e.x, e.y-20);
                }
                if(e.special === "summon" && !e.isBoss) {
                    if(e.summonCooldown <= 0 && Math.random()<0.01) {
                        enemies.push({ x:e.x+30, y:e.y+30, hp:30, maxHp:30, dmg:8, radius:14, typeName:"Призванный", special:null, speed:1.2, color:"#8e44ad", isBoss:false });
                        e.summonCooldown = 3.0;
                    } else if(e.summonCooldown>0) e.summonCooldown -= deltaSec;
                }
                // пассивка страха
                if(currentStats.passiveEffect === "fear" && Math.hypot(player.x-e.x, player.y-e.y) < 100) e.speed *= 0.9;
            }
            
            // стрельба боссов
            for(let i=0;i<enemies.length;i++) {
                let e = enemies[i];
                if(e.isBoss) {
                    if(e.shootCooldown <= 0) {
                        let angle = Math.atan2(player.y - e.y, player.x - e.x);
                        enemyBullets.push({ x:e.x, y:e.y, vx:Math.cos(angle)*5, vy:Math.sin(angle)*5, radius:8, damage:15+Math.floor(wave/3), life:3.0 });
                        e.shootCooldown = e.shootDelay;
                    } else e.shootCooldown -= deltaSec;
                }
            }
            
            // вражеские пули
            for(let i=0;i<enemyBullets.length;i++) {
                let eb = enemyBullets[i];
                eb.x += eb.vx; eb.y += eb.vy;
                eb.life -= deltaSec;
                if(eb.life <= 0 || eb.x<-100 || eb.x>canvas.width+100 || eb.y<-100 || eb.y>canvas.height+100) { enemyBullets.splice(i,1); i--; continue; }
                if(Math.hypot(eb.x - player.x, eb.y - player.y) < eb.radius + player.radius && player.invincible<=0 && invisibleTimer<=0) {
                    let dmg = eb.damage;
                    if(currentStats.passiveEffect === "armor") dmg = Math.floor(dmg*0.8);
                    player.hp -= dmg;
                    player.invincible = 0.5;
                    enemyBullets.splice(i,1);
                    if(player.hp <= 0 && currentStats.passiveEffect==="revive" && !reviveUsed) { player.hp = currentStats.maxHp*0.5; reviveUsed=true; showFloatingText("🔥 ВОЗРОЖДЕНИЕ!", player.x, player.y-30); player.invincible=1.5; }
                    else if(player.hp<=0) { gameOver = true; alert("ПОРАЖЕНИЕ! Перезапустите арену в меню."); }
                    i--;
                }
            }
            
            // сбор предметов
            for(let i=0;i<starDrops.length;i++) {
                let d = starDrops[i];
                if(Math.hypot(player.x-d.x, player.y-d.y) < player.radius+d.radius) {
                    if(d.kind === "star") { addCoins(80); addGems(4); }
                    else { addCoins(220); addGems(14); applyDamageBuff(8); }
                    starDrops.splice(i,1); i--;
                }
            }
            for(let i=0;i<lootBoxes.length;i++) {
                let box = lootBoxes[i];
                for(let b=0;b<bullets.length;b++) {
                    if(Math.hypot(bullets[b].x-box.x, bullets[b].y-box.y) < bullets[b].radius+box.radius) {
                        bullets.splice(b,1);
                        let coinsGain = 50 + Math.floor(Math.random()*60);
                        addCoins(coinsGain);
                        if(Math.random() < 0.25) { applyDamageBuff(10); showFloatingText(`+50% УРОНА!`, box.x, box.y-15); addUltraCharge(15); }
                        else { showFloatingText(`+${coinsGain} 🪙`, box.x, box.y-15); addUltraCharge(5); }
                        lootBoxes.splice(i,1);
                        break;
                    }
                }
            }
            
            if(enemies.length === 0 && score >= enemiesToSpawn) nextWave();
            else if(enemies.length < 4 && Math.random()<0.025 && enemies.length+score < enemiesToSpawn) spawnEnemy(false);
            spawnLootBox();
            spawnStarDropItem();
            checkBossSpawn();
            
            if(player.hp < player.maxHp && player.invincible<=0 && Math.random()<0.02) player.hp = Math.min(player.maxHp, player.hp+1);
            addUltraCharge(deltaSec * 3);
            if(currentStats.passiveEffect === "healAura" && Math.random()<0.05) player.hp = Math.min(player.maxHp, player.hp+5);
            // невидимость Леона
            if(currentStats.passiveEffect === "invisible" && player.hp < currentStats.maxHp*0.3 && invisibleTimer<=0 && player.invincible<=0) { invisibleTimer = 3; showFloatingText("👻 НЕВИДИМОСТЬ", player.x, player.y-20); }
            // фаза Призрака
            if(currentStats.passiveEffect === "phase") { /* проход сквозь врагов уже реализован через invisibleTimer? можно просто игнорировать коллизию, но для простоты оставим */ }
        }
        
        function nextWave() {
            wave++;
            score = 0;
            enemiesToSpawn = Math.min(4+wave, 18);
            bossSpawnedForWave = false;
            for(let i=0;i<Math.min(3, enemiesToSpawn); i++) spawnEnemy(false);
            addCoins(100+wave*10);
            addGems(2+Math.floor(wave/5));
            showFloatingText(`ВОЛНА ${wave}`, canvas.width/2, 50);
        }
        
        function resetGameArena() {
            gameOver = false; paused = false; wave = 1; score = 0; enemiesToSpawn = 5;
            enemies = []; bullets = []; lootBoxes = []; starDrops = []; enemyBullets = [];
            player.hp = currentStats.maxHp; player.maxHp = currentStats.maxHp;
            player.x = canvas.width/2; player.y = canvas.height/2;
            player.slowTimer = 0; damageBuffRemaining = 0; damageBuffUltraRemaining = 0;
            bossSpawnedForWave = false; ultraCharge = 0; ultraReady = false; reviveUsed = false; invisibleTimer = 0;
            for(let i=0;i<3;i++) spawnEnemy(false);
            updateBuffUI(); saveGame();
        }
        
        function togglePause() { paused = !paused; document.getElementById("pauseBtn").innerText = paused ? "▶️ СТАРТ" : "⏸️ ПАУЗА"; }
        
        // Отрисовка с детализацией карты
        function drawMapDecor() {
            const map = maps[currentMapId];
            if(!map.decor) return;
            for(let decor of map.decor) {
                for(let i=0; i<decor.count; i++) {
                    let x = (i * 131 + wave) % canvas.width;
                    let y = (i * 97) % canvas.height;
                    if(decor.type === "tree") { ctx.fillStyle = "#2e7d32"; ctx.fillRect(x-5, y-10, 10, 20); ctx.fillStyle = "#1b5e20"; ctx.beginPath(); ctx.arc(x, y-10, 8, 0, Math.PI*2); ctx.fill(); }
                    else if(decor.type === "cactus") { ctx.fillStyle = "#2e7d32"; ctx.fillRect(x-3, y-12, 6, 18); ctx.fillStyle = "#c8e6c9"; ctx.fillRect(x-1, y-18, 2, 8); }
                    else if(decor.type === "pillar") { ctx.fillStyle = "#8d6e63"; ctx.fillRect(x-8, y-20, 16, 30); ctx.fillStyle = "#d7ccc8"; ctx.fillRect(x-4, y-25, 8, 10); }
                    else if(decor.type === "snowman") { ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(x, y-12, 8, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x, y-2, 6, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "#000"; ctx.fillRect(x-2, y-15, 4, 3); }
                    else if(decor.type === "lava") { ctx.fillStyle = "#ff5722"; ctx.beginPath(); ctx.ellipse(x, y, 12, 6, 0, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "#ff9800"; ctx.beginPath(); ctx.ellipse(x-3, y-2, 4, 2, 0, 0, Math.PI*2); ctx.fill(); }
                    else if(decor.type === "skull") { ctx.fillStyle = "#bdbdbd"; ctx.fillRect(x-5, y-10, 10, 12); ctx.fillStyle = "#424242"; ctx.fillRect(x-3, y-12, 6, 4); }
                    else if(decor.type === "palm") { ctx.fillStyle = "#795548"; ctx.fillRect(x-3, y-18, 6, 22); ctx.fillStyle = "#4caf50"; for(let a=0;a<5;a++) ctx.fillRect(x-8+a*4, y-20, 3, 12); }
                    else if(decor.type === "planet") { ctx.fillStyle = "#fdd835"; ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "#f9a825"; ctx.beginPath(); ctx.arc(x-4, y-3, 3, 0, Math.PI*2); ctx.fill(); }
                    else { ctx.fillStyle = "#a1887f"; ctx.fillRect(x-4, y-8, 8, 16); }
                }
            }
        }
        
        function draw() {
            const map = maps[currentMapId];
            ctx.fillStyle = map.bgColor1;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            for(let i=0;i<120;i++) { ctx.fillStyle = map.patternColor; ctx.globalAlpha = 0.3; ctx.beginPath(); ctx.arc((i*131)%canvas.width, (i*79)%canvas.height, 2,0,Math.PI*2); ctx.fill(); }
            ctx.globalAlpha = 1;
            drawMapDecor();
            for(let box of lootBoxes) { ctx.fillStyle="#b87c4f"; ctx.fillRect(box.x-15,box.y-15,30,30); ctx.fillStyle="gold"; ctx.font="20px monospace"; ctx.fillText("📦",box.x-12,box.y+10); }
            for(let d of starDrops) { ctx.fillStyle=d.kind==="star"?"#FFD966":"#ff6a5c"; ctx.beginPath(); ctx.arc(d.x,d.y,d.radius,0,Math.PI*2); ctx.fill(); ctx.fillStyle="white"; ctx.fillText(d.kind==="star"?"⭐":"💥",d.x-8,d.y+7); }
            for(let e of enemies) {
                ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x,e.y,e.radius,0,Math.PI*2); ctx.fill();
                ctx.fillStyle="black"; ctx.font="bold 11px monospace";
                ctx.fillText(`${e.typeName} ${Math.floor(e.hp)}`, e.x-20, e.y-14);
                ctx.fillStyle="#e0b03b"; ctx.fillRect(e.x-12, e.y-18, (e.hp/e.maxHp)*24, 5);
                if(e.burnTimer>0) { ctx.fillStyle="#ff6600"; ctx.beginPath(); ctx.arc(e.x, e.y, e.radius+2, 0, Math.PI*2); ctx.fill(); }
            }
            for(let eb of enemyBullets) { ctx.fillStyle="#ff4444"; ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.radius-2, 0, Math.PI*2); ctx.fill(); ctx.fillStyle="#ff8888"; ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.radius-4, 0, Math.PI*2); ctx.fill(); }
            ctx.shadowBlur=8;
            if(invisibleTimer<=0) { ctx.fillStyle = currentStats.color; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill(); }
            else { ctx.globalAlpha = 0.4; ctx.fillStyle = "#aaaaaa"; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; }
            ctx.fillStyle = "#2c2c2c"; ctx.beginPath(); ctx.arc(player.x-5, player.y-5, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(player.x-7, player.y-7, 2, 0, Math.PI*2); ctx.fill();
            ctx.font = `${Math.floor(player.radius*1.2)}px "Segoe UI Emoji"`;
            ctx.fillStyle = "white";
            ctx.fillText(currentStats.icon, player.x-12, player.y+8);
            ctx.fillStyle = "#e25822";
            ctx.fillRect(player.x+5, player.y-6, 10, 6);
            ctx.fillStyle = "white";
            ctx.font = "bold 14px monospace";
            ctx.fillText(`❤️ ${Math.floor(player.hp)}/${player.maxHp}`, player.x-25, player.y-18);
            for(let b of bullets) { ctx.fillStyle="#ffc857"; ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill(); }
            for(let i=0;i<floatingTexts.length;i++) {
                let ft = floatingTexts[i];
                ctx.globalAlpha = ft.life;
                ctx.fillStyle = "#ffd966";
                ctx.font = "bold 14px monospace";
                ctx.fillText(ft.text, ft.x-15, ft.y - (1-ft.life)*20);
                ft.life -= 0.03;
                if(ft.life<=0) floatingTexts.splice(i,1), i--;
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur=0;
            ctx.fillStyle = "gold"; ctx.font = "bold 18px monospace";
            ctx.fillText(`Волна ${wave} | Убито: ${score}/${enemiesToSpawn}`, 20, 45);
            if(gameOver) { ctx.fillStyle="black"; ctx.font="bold 38px monospace"; ctx.fillText("GAME OVER", canvas.width/2-110, canvas.height/2); }
            if(paused) { ctx.fillStyle="white"; ctx.font="bold 40px monospace"; ctx.fillText("ПАУЗА", canvas.width/2-70, canvas.height/2); }
            ctx.fillStyle="#ffeda3"; ctx.font="14px monospace";
            ctx.fillText(`Урон: ${getCurrentDamage()} (база ${currentStats.dmg})`, 20, 90);
        }
        
        // ---------- МЕНЮ (с изменениями для монетных скинов) ----------
        function showAchievements() { /* аналогично */ let div = document.createElement('div'); div.className = 'menu-screen'; div.innerHTML = `<div class="menu-card"><h2>🏆 ДОСТИЖЕНИЯ</h2><div class="achievements-list" id="achievementsList"></div><button class="btn close-btn" id="closeAch">ЗАКРЫТЬ</button></div>`; document.body.appendChild(div); let container = document.getElementById('achievementsList'); for(let [key, ach] of Object.entries(achievements)) { let card = document.createElement('div'); card.className = `achievement-card ${ach.claimed ? 'selected' : ''}`; card.innerHTML = `<strong>${key}</strong><br>${ach.desc}<br>${ach.progress}/${ach.target} ${ach.claimed ? '✅' : '🔒'}<br>+${ach.rewardGems}⭐ +${ach.rewardCoins}🪙`; container.appendChild(card); } document.getElementById('closeAch').onclick = () => div.remove(); }
        function showMapMenu() { let div = document.createElement('div'); div.className = 'menu-screen'; div.innerHTML = `<div class="menu-card"><h2>🗺️ ВЫБОР КАРТЫ (10 карт)</h2><div class="map-list" id="mapList"></div><button class="btn close-btn" id="closeMapMenu">ЗАКРЫТЬ</button></div>`; document.body.appendChild(div); let container = document.getElementById('mapList'); for(let [mapName, mapData] of Object.entries(maps)) { let card = document.createElement('div'); card.className = `map-card ${currentMapId===mapName ? 'selected' : ''}`; card.innerHTML = `<strong>${mapName}</strong>`; card.onclick = () => { currentMapId = mapName; document.getElementById("mapName").innerText = currentMapId; saveGame(); div.remove(); }; container.appendChild(card); } document.getElementById('closeMapMenu').onclick = () => div.remove(); }
        function showSkinShop() { let div = document.createElement('div'); div.className = 'menu-screen'; div.innerHTML = `<div class="menu-card"><h2>🎨 МАГАЗИН СКИНОВ (за 🪙 монеты)</h2><div id="skinShopContent"></div><button class="btn close-btn" id="closeSkinShop">ЗАКРЫТЬ</button></div>`; document.body.appendChild(div); let content = document.getElementById('skinShopContent'); function renderSkinShop() { content.innerHTML = `<h3>Скины для: ${currentBrawlerId}</h3><div class="skin-list" id="skinList"></div>`; let skinListDiv = document.getElementById('skinList'); let skins = skinsDB[currentBrawlerId]; for(let [sname, sdata] of Object.entries(skins)) { let owned = ownedSkins[currentBrawlerId]?.includes(sname); let isCurrent = (currentSkin[currentBrawlerId] === sname); let card = document.createElement('div'); card.className = `skin-card ${isCurrent ? 'selected' : ''} ${!owned ? 'locked' : ''}`; card.innerHTML = `<div style="display:flex; align-items:center; gap:8px;"><span style="font-size:24px;">${sdata.icon}</span> <strong>${sname}</strong><br>🪙${sdata.priceCoins}</div>`; if(!owned) card.onclick = () => { if(purchaseSkin(currentBrawlerId, sname)) renderSkinShop(); }; else card.onclick = () => { setSkin(currentBrawlerId, sname); renderSkinShop(); recalcStats(); }; skinListDiv.appendChild(card); } } renderSkinShop(); document.getElementById('closeSkinShop').onclick = () => div.remove(); }
        function showBrawlerMenu() { let div = document.createElement('div'); div.className = 'menu-screen'; div.innerHTML = `<div class="menu-card"><h2>👥 БОЙЦЫ (12 шт, цена в ⭐)</h2><div class="brawler-list" id="brawlerShopList"></div><div class="upgrade-area"><button id="upgradeBtnMenu" class="btn">⬆️ ПРОКАЧКА</button><p>Стоимость улучшения: <span id="upgradeCostSpan">0</span></p><button id="skinShopBtn" class="btn" style="margin-top:10px;">🎽 МАГАЗИН СКИНОВ</button><button id="mapBtn" class="btn" style="margin-top:10px;">🗺️ ВЫБОР КАРТЫ</button><button id="achBtn" class="btn" style="margin-top:10px;">🏆 ДОСТИЖЕНИЯ</button></div><button class="btn close-btn" id="closeShop">ЗАКРЫТЬ</button></div>`; document.body.appendChild(div); let container = document.getElementById('brawlerShopList'); function renderShop() { container.innerHTML = ""; for(let [id, data] of Object.entries(brawlersCatalog)) { let owned = ownedBrawlers.includes(id); let card = document.createElement('div'); card.className = `brawler-card ${currentBrawlerId===id ? 'selected' : ''} ${!owned ? 'locked' : ''}`; let skinIcon = getCurrentColorAndIcon().icon; let passiveShort = data.passive.split(":")[0]; card.innerHTML = `<strong>${skinIcon} ${id}</strong> (${data.rarity}) Lv.${data.level}<br>❤️${data.hp+(data.level-1)*12} ⚔${data.dmg+(data.level-1)*3}<br>✨ ${passiveShort}<br>${owned ? '' : `⭐${data.priceGems}`}`; if(!owned) card.onclick = () => { if(purchaseBrawler(id)) { renderShop(); if(id===currentBrawlerId) recalcStats(); } }; else card.onclick = () => { currentBrawlerId = id; recalcStats(); player.maxHp = currentStats.maxHp; player.hp = currentStats.maxHp; saveGame(); renderShop(); }; container.appendChild(card); } let b = brawlersCatalog[currentBrawlerId]; let cost = b.level<b.maxLevel ? b.upgradeCost[b.level-1] : "MAX"; document.getElementById('upgradeCostSpan').innerText = cost; } renderShop(); document.getElementById('upgradeBtnMenu').onclick = () => { upgradeBrawler(); renderShop(); saveGame(); if(!gameOver) player.maxHp = currentStats.maxHp, player.hp = Math.min(player.hp, currentStats.maxHp); }; document.getElementById('skinShopBtn').onclick = () => { showSkinShop(); }; document.getElementById('mapBtn').onclick = () => { showMapMenu(); }; document.getElementById('achBtn').onclick = () => { showAchievements(); }; document.getElementById('closeShop').onclick = () => div.remove(); }
        function showMainMenu() { let menuDiv = document.createElement('div'); menuDiv.className = 'menu-screen'; menuDiv.innerHTML = `<div class="menu-card"><h2>⚔️ BRAWL STARS ULTRA</h2><button class="btn" id="resumeBtn">Продолжить</button><button class="btn" id="resetArenaBtn">Перезапуск арены</button><button class="btn" id="brawlersBtn">Персонажи & прокачка</button><button class="btn" id="skinShopMainBtn">🎨 Магазин скинов (за монеты)</button><button class="btn" id="mapMainBtn">🗺️ Выбор карты (10)</button><button class="btn" id="achMainBtn">🏆 Достижения</button><button class="btn" id="saveGameBtn">Сохранить</button><button class="btn close-btn" id="closeMenuBtn">Закрыть</button></div>`; document.body.appendChild(menuDiv); document.getElementById('resumeBtn').onclick = () => menuDiv.remove(); document.getElementById('resetArenaBtn').onclick = () => { resetGameArena(); menuDiv.remove(); }; document.getElementById('brawlersBtn').onclick = () => { showBrawlerMenu(); menuDiv.remove(); }; document.getElementById('skinShopMainBtn').onclick = () => { showSkinShop(); menuDiv.remove(); }; document.getElementById('mapMainBtn').onclick = () => { showMapMenu(); menuDiv.remove(); }; document.getElementById('achMainBtn').onclick = () => { showAchievements(); menuDiv.remove(); }; document.getElementById('saveGameBtn').onclick = () => { saveGame(); alert("Сохранено!"); }; document.getElementById('closeMenuBtn').onclick = () => menuDiv.remove(); }
        
        function saveGame() {
            let save = { gems, coins, ownedBrawlers, currentBrawlerId, wave, enemiesToSpawn, score, ownedSkins, currentSkin, currentMapId, achievements, brawlersCatalogLevels: {} };
            for(let id in brawlersCatalog) save.brawlersCatalogLevels[id] = brawlersCatalog[id].level;
            localStorage.setItem("brawlUltraSave", JSON.stringify(save));
        }
        function loadGame() {
            let data = localStorage.getItem("brawlUltraSave");
            if(data) {
                let s = JSON.parse(data);
                gems = s.gems; coins = s.coins; ownedBrawlers = s.ownedBrawlers; currentBrawlerId = s.currentBrawlerId;
                wave = s.wave || 1; enemiesToSpawn = s.enemiesToSpawn || 5; score = s.score || 0;
                if(s.ownedSkins) ownedSkins = s.ownedSkins;
                if(s.currentSkin) currentSkin = s.currentSkin;
                if(s.currentMapId) currentMapId = s.currentMapId;
                if(s.achievements) achievements = s.achievements;
                if(s.brawlersCatalogLevels) for(let id in s.brawlersCatalogLevels) if(brawlersCatalog[id]) brawlersCatalog[id].level = s.brawlersCatalogLevels[id];
                recalcStats();
                updateUI();
            } else { recalcStats(); updateUI(); }
            resetGameArena();
            // ежедневная награда
            let lastDate = localStorage.getItem("brawlDailyDate");
            let today = new Date().toDateString();
            if(lastDate !== today) { let rc = 500+Math.random()*500, rg = 20+Math.random()*30; coins+=rc; gems+=rg; localStorage.setItem("brawlDailyDate", today); updateUI(); showFloatingText(`🎁 Ежедневная награда! +${Math.floor(rg)}⭐ +${Math.floor(rc)}🪙`, canvas.width/2, 80); saveGame(); }
        }
        
        // управление
        window.addEventListener('keydown', (e) => { let code = e.code; if(code === 'KeyW') keys.w = true; if(code === 'KeyA') keys.a = true; if(code === 'KeyS') keys.s = true; if(code === 'KeyD') keys.d = true; if(code === 'Escape') togglePause(); if(code === 'KeyR' && !paused && !gameOver) useUltra(); });
        window.addEventListener('keyup', (e) => { let code = e.code; if(code === 'KeyW') keys.w = false; if(code === 'KeyA') keys.a = false; if(code === 'KeyS') keys.s = false; if(code === 'KeyD') keys.d = false; });
        
        let lastFrame = performance.now();
        function gameLoop() { let now = performance.now(); let delta = Math.min(0.033, (now - lastFrame) / 1000); lastFrame = now; updateGame(delta); draw(); requestAnimationFrame(gameLoop); }
        
        document.getElementById('menuBtn').onclick = () => showMainMenu();
        document.getElementById('pauseBtn').onclick = () => togglePause();
        document.getElementById('chaosBoxBtn').onclick = () => openChaosDrop();
        document.getElementById('ultraBoxBtn').onclick = () => openUltraDrop();
        document.getElementById('omegaBoxBtn').onclick = () => openOmegaDrop();
        document.getElementById('starBoxBtn').onclick = () => openStarDrop();
        
        loadGame();
        gameLoop();
    })();
</script>
</body>
